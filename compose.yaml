services:
  bot:
    build: 
      context: .
      dockerfile: Botty/Dockerfile-dev
    
    restart: always
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    develop:
      watch:
        - action: sync
          path: ./Botty
          target: /
          initial_sync: true

