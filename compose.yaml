services:
  bot:
    build: 
      context: .
      dockerfile: Botty/Dockerfile
    
    restart: always
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env

  dashboard:
    build: 
      context: .
      dockerfile: Dashboard/Dockerfile
    restart: always
    ports:
        - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    develop:
      watch:
        - action: rebuild
          path: .
          target: /
          initial_sync: true

  db:
    image: postgres
    restart: always
    shm_size: 128mb
    volumes:
      - ./data/db:/var/lib/postgresql/data
    env_file:
        - .env
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d botty_db"]
      interval: 5s
      timeout: 5s
      retries: 5
  adminer:
    image: adminer
    restart: always
    ports:
      - "7070:8080"
